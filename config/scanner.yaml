
o2_relaxed:
  price_min: 5.0
  price_max: 2000.0
  min_gap_pct: 0.0
  min_premarket_volume: 0
  min_dollar_volume: 50000
  max_spread_pct: 5.0
scanner:
  price_min: 5.0
  price_max: 2000.0
  min_gap_pct: 0.5
  max_gap_pct: 8.0
  min_gap_pct_quality: 0.2
  min_premarket_volume: 50000
  min_dollar_volume: 500000
  max_spread_pct: 2.0
  min_score: 50
  max_candidates: 8

midday:
  min_relative_volume: 1.5
  min_dollar_volume: 500000
  max_spread_pct: 2.0
  min_score: 60

# Catalyst scoring thresholds used by the filter chain
catalyst:
  # Symbols with score >= this are included in night research universe
  min_night_score: 40
  # Catalyst score above which strict filters are bypassed (strong news event)
  bypass_score: 70
  # Catalyst gate floor for Option 2 (relaxed) mode
  relaxed_gate_score: 55

# Card-building scoring parameters
scoring:
  # Final card score = ranker_score * ranker_weight + confluence * confluence_weight
  ranker_weight: 0.60
  confluence_weight: 0.40
  # Confluence floor raised during 9:30–9:45 ET opening fakeout window
  opening_window_confluence_floor: 15
  # Min score for the Option 2 (relaxed) ranker
  o2_min_score: 25

# Intraday momentum scanner — catches stocks rallying from today's open.
# Runs alongside GapScanner during midday/close sessions.
momentum:
  price_min: 5.0
  price_max: 2000.0
  min_intraday_change_pct: 1.5
  min_relative_volume: 1.3
  min_dollar_volume: 500000
  max_spread_pct: 2.0
  require_above_vwap: true
