risk:
  account_value: 25000
  max_trades_per_day: 8
  o2_max_trades_per_day: 2
  daily_loss_lockout_pct: 1.5
  max_consecutive_losses: 3
  risk_per_trade_pct: 0.75
  fixed_stop_pct: 2.5
  # Risk-tiered stops: low-risk trades get tighter stops to reduce
  # loss magnitude. Data shows low-risk trades have 36% WR with avg
  # PnL +0.08% — tighter stops limit damage without hurting upside.
  stop_pct_low_risk: 1.5
  stop_pct_medium_risk: 2.5
  stop_pct_high_risk: 2.5

# ── Execution engine (IBKR) ──────────────────────────────────────────
execution:
  mode: alert_only              # alert_only / paper / live
  max_concurrent_positions: 3
  max_morning_entries: 2
  reserve_midday_slots: 1
  morning_deadline: "10:30"     # ET — sell losers/flat, trail winners to BE
  entry_order_buffer_pct: 0.1   # limit order buffer above scan price (morning)
  midday_use_market_order: true # use market orders for midday session
  expire_time: "15:30"          # ET — cancel all orders + market sell
  pdt_protection: true          # track 3/5 rolling day trade limit
  pdt_threshold: 25000          # PDT rule applies below this equity
  kill_switch_enabled: true     # enable Telegram /killall command
  max_notional_per_trade: 10000 # hard cap per trade ($10K)
  max_account_value: 25000      # cap NLV for sizing (use only $25K of account)

  # ── Swap evaluator (opportunity cost engine) ──────────────────────
  swap:
    enabled: true               # master switch
    mode: auto                  # shadow = log + Telegram only, auto = execute swaps
    threshold: 20               # new_score - weakest_hold_score must exceed this
    min_hold_minutes: 15        # don't consider swapping positions < 15 min old
    stalling_range_pct: 0.3     # price range (%) that counts as "stalling"
    stalling_lookback_bars: 4   # recent bars to check for consolidation
    stalling_min_minutes: 20    # minimum age before stalling detection kicks in
    stalling_penalty: 20        # points deducted from hold score when stalling
