services:
  - type: cron
    name: tradingbot-news-night
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-news --label "Night Research"
    schedule: "0 5 * * *"
      # Alpaca broker
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      # News sources
      - key: SEC_USER_AGENT
        sync: false
      - key: NEWS_SOCIAL_PROXY_ENABLED
        value: "true"
      - key: NEWS_SEC_FILINGS
        value: "true"
      - key: NEWS_RSS_FEEDS
        value: "true"
      - key: NEWS_EARNINGS_CALENDAR
        value: "true"
      - key: NEWS_PRESS_RELEASES
        value: "true"
      - key: NEWS_TWITTER_ENABLED
        value: "false"
      - key: NEWS_REDDIT_ENABLED
        value: "false"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: NEWS_MAX_AGE_HOURS
        value: "24"
      # AI sentiment (optional)
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Telegram notifications
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

