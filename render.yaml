services:
  # -- Web Dashboard ----------------------------------------------------------
  - type: web
    name: tradingbot-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src gunicorn --workers 1 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT tradingbot.web.app:app
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.5"

  # -- News Research ----------------------------------------------------------
  - type: cron
    name: tradingbot-news-night
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-news --label "Night Research"
    schedule: "0 5 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: SEC_USER_AGENT
        sync: false
      - key: NEWS_SOCIAL_PROXY_ENABLED
        value: "true"
      - key: NEWS_SEC_FILINGS
        value: "true"
      - key: NEWS_RSS_FEEDS
        value: "true"
      - key: NEWS_EARNINGS_CALENDAR
        value: "true"
      - key: NEWS_PRESS_RELEASES
        value: "true"
      - key: NEWS_TWITTER_ENABLED
        value: "false"
      - key: NEWS_REDDIT_ENABLED
        value: "false"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: NEWS_MAX_AGE_HOURS
        value: "24"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    name: tradingbot-news-premarket
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-news --label "Pre-Market Research"
    schedule: "0 12 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: SEC_USER_AGENT
        sync: false
      - key: NEWS_SOCIAL_PROXY_ENABLED
        value: "true"
      - key: NEWS_SEC_FILINGS
        value: "true"
      - key: NEWS_RSS_FEEDS
        value: "true"
      - key: NEWS_EARNINGS_CALENDAR
        value: "true"
      - key: NEWS_PRESS_RELEASES
        value: "true"
      - key: NEWS_TWITTER_ENABLED
        value: "false"
      - key: NEWS_REDDIT_ENABLED
        value: "false"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: NEWS_MAX_AGE_HOURS
        value: "24"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false

  # -- Pre-Market Scan --------------------------------------------------------
  - type: cron
    name: tradingbot-morning
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-morning
    schedule: "45 12 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false

  # -- Intraday/Midday Scans (every 30 min, ~9:00 AM to ~2:30 PM EDT, weekdays)
  - type: cron
    name: tradingbot-intraday
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-midday
    schedule: "*/30 13-18 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false

  # -- Trade Tracker (every 5 min during market hours) -----------------------
  - type: cron
    name: tradingbot-tracker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-tracker
    schedule: "*/5 13-20 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false

  # -- Close Scan (overnight holds + daily recap at 3:30 PM) ------------------
  - type: cron
    name: tradingbot-close
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-close
    schedule: "30 19 * * 1-5"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        value: "https://cgkogwtlrxhbexdifsge.supabase.co"
      - key: SUPABASE_KEY
        sync: false