services:
  - type: cron
    name: tradingbot-news-night
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: PYTHONPATH=src python -m tradingbot.cli --real-data run-news
    schedule: "0 5 * * *"
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: NEWS_SOCIAL_PROXY_ENABLED
        value: "true"
      - key: SEC_USER_AGENT
        sync: false

  - type: cron
    name: tradingbot-news-premarket
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
